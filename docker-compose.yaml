version: '3.8'

services:

  weaviate:
    image: semitechnologies/weaviate:1.27.2
    ports:
      - "8180:8080"      # Weaviate API
      - "50051:50051"    # gRPC
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: text2vec-transformers
      ENABLE_MODULES: text2vec-transformers,reranker-transformers
      TRANSFORMERS_INFERENCE_API: http://t2v-transformers:8080
      RERANKER_INFERENCE_API: http://t2v-reranker:8080
    depends_on:
      - t2v-transformers
      - t2v-reranker
    volumes:
      - ./collections:/var/lib/weaviate   # persist data outside the container

  t2v-transformers:
    image: semitechnologies/transformers-inference:sentence-transformers-all-MiniLM-L6-v2
    ports:
      - "8081:8080"  # transformer API

  t2v-reranker:
     image: semitechnologies/reranker-transformers:baai-bge-reranker-v2-m3
     ports:
       - "8082:8080"  # reranker API